    'You write short backstories for characters in a low-fantasy, grim, rare-magic medieval world.',
    'Setting rules you must obey: technology and society sit at roughly 1150-1350 Western/Central Europe;',
    'magic is rare, dangerous, and always deniable — never overt; the Faith (the Kirk) is a monotheist church',
    'with saints, relics, tithes and heresies, the largest landowner and only literacy pipeline;',
    'humans only — no elves, dwarves, or monsters; names are invented but plausible.',
    'Constraints for the piece you write:',
    '- 250 to 400 words, third person, past tense.',
    '- Reference the character\'s secret OBLIQUELY — never state it outright.',
    '- End on the character\'s current problem, unresolved.',
    '- No modern idiom, no anachronism, no purple prose.',
    '- If the character has the Touch, keep it ambiguous — it must be explainable as coincidence.',
  ].join('\n');

  function getKey() { try { return localStorage.getItem(KEY_STORE) || ''; } catch (e) { return ''; } }
  function setKey(k) { try { k ? localStorage.setItem(KEY_STORE, k) : localStorage.removeItem(KEY_STORE); } catch (e) { } }
  function getCached(seed) { try { return localStorage.getItem(CACHE_PREFIX + seed); } catch (e) { return null; } }
  function setCached(seed, text) { try { localStorage.setItem(CACHE_PREFIX + seed, text); } catch (e) { } }

  async function writeTale(c, onDelta, onDone, onError) {
    const key = getKey();
    if (!key) { onError('No API key set. Open Settings and paste an Anthropic API key.'); return; }
    const sheet = EXPORT.toMarkdown(c);
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          stream: true,
          system: SYSTEM,
          messages: [{ role: 'user', content: 'Write the tale of this character.\n\n' + sheet }],
        }),
      });
      if (!res.ok) {
        const body = await res.text();
        onError('API error ' + res.status + ': ' + body.slice(0, 300));
        return;
      }
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = '', full = '';
      for (; ;) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data:')) continue;
          const payload = line.slice(5).trim();
          if (payload === '[DONE]') continue;
          try {
            const ev = JSON.parse(payload);
            if (ev.type === 'content_block_delta' && ev.delta && ev.delta.text) { full += ev.delta.text; onDelta(full); }
            if (ev.type === 'error') { onError('API stream error: ' + JSON.stringify(ev.error).slice(0, 200)); return; }
          } catch (e) { /* partial frame */ }
        }
      }
      setCached(c.seed, full);
      onDone(full);
    } catch (e) {
      onError('Request failed: ' + e.message + ' (network blocked, bad key, or offline)');
    }
  }

  return { getKey, setKey, getCached, writeTale };
})();

/* ---------- UI ---------- */
if (typeof document !== 'undefined') (function () {
  const $ = (sel) => document.querySelector(sel);
  const state = { seed: '', locks: {}, char: null, hoveredPath: null, group: null, sel: 0, mode: 'grim', item: null, itemSeed: null };

  function currentDebug() { return /[?&#]debug=1|#debug\b/.test(location.search + location.hash); }
  TRACE.on = currentDebug();

  function seedFromHash() {
    const m = location.hash.match(/seed=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : null;
  }
  function groupFromHash() {
    const m = location.hash.match(/group=(household|warband|settlement)/);
    return m ? m[1] : null;
  }
  function writeHash() {
    history.replaceState(null, '', '#seed=' + encodeURIComponent(state.seed)
      + (state.group ? '&group=' + state.group.kind : '')
      + (state.mode === '5e' ? '&rules=5e' : '')
      + (state.item ? '&item=' + encodeURIComponent(state.itemSeed) : '')
      + (currentDebug() ? '&debug=1' : ''));
  }
  function modeFromHash() { return /rules=5e/.test(location.hash) ? '5e' : 'grim'; }
  function itemFromHash() {
    const m = location.hash.match(/item=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : null;
  }

  function generate(newSeed) {
    TRACE.rows = [];
    state.seed = newSeed;
    state.group = null;
    const overrides = {
      region: $('#ov-region').value || undefined,
      socialClass: $('#ov-class').value || undefined,
      sex: $('#ov-sex').value || undefined,
    };
    state.char = GEN.generate(state.seed, { locks: state.locks, overrides, mode: state.mode });
    $('#seed-input').value = state.seed;
    writeHash();
    renderStrip();
    render();
  }

  /* Companies: households & warbands. Locks and the constraint dropdowns apply
     to single characters only — a company manages its own internal coherence. */
  function generateGroup(kind, baseSeed) {
    TRACE.rows = [];
    state.seed = baseSeed;
    state.group = GEN.generateGroup(baseSeed, kind, state.mode);
    state.sel = 0;
    state.char = state.group.members[0].char;
    $('#seed-input').value = baseSeed;
    writeHash();
    renderStrip();
    render();
  }

  function renderSettlementBox() {
    const box = $('#settlement-box');
    const s = state.group;
    if (!s || s.kind !== 'settlement') { box.style.display = 'none'; box.innerHTML = ''; return; }
    box.style.display = '';
    box.innerHTML = '<h2>' + esc(s.name) + '</h2>' +
      '<div class="s-sub">' + esc(s.size) + ' of some ' + s.population + ' souls · ' + esc(s.region.name) + ' · ' + esc(s.holder) + '</div>' +
      '<ul>' + s.features.map(f => '<li>' + esc(f) + '</li>').join('') + '</ul>' +
      '<div>Custom: ' + esc(s.custom) + '.</div>' +
      '<div class="s-trouble">The village’s trouble: ' + esc(s.trouble) + '.</div>' +
      (s.feuds || []).map(f => '<div class="s-feud">Feud: ' + esc(f.sides[0]) + ' against ' + esc(f.sides[1]) +
        ' — over ' + esc(f.cause) + '; ' + esc(f.state) + '.</div>').join('');
  }

  function renderStrip() {
    renderSettlementBox();
    // Keep the print-summary sheet current with the active company.
    $('#print-summary').innerHTML = state.group ? EXPORT.companySummaryHTML(state.group) : '';
    $('#print-summary-btn').disabled = !state.group;
    $('#print-summary-btn').title = state.group ? 'Print a one-page roster of the whole company'
      : 'Generate a household, warband, or settlement first';
    const strip = $('#group-strip');
    if (!state.group) { strip.style.display = 'none'; strip.innerHTML = ''; return; }
    strip.style.display = '';
    strip.innerHTML = state.group.members.map((m, i) =>
      '<div class="member-card' + (i === state.sel ? ' sel' : '') + '" data-idx="' + i + '">' +
      PORTRAIT.render(m.char.portrait, 'card' + i) +
      '<div class="m-name">' + esc(m.char.name.given) + '</div>' +
      '<div class="m-role">' + esc(m.role) + '</div></div>').join('');
    strip.querySelectorAll('.member-card').forEach(card => {
      card.onclick = () => {
        state.sel = +card.dataset.idx;
        state.char = state.group.members[state.sel].char;
        renderStrip();
        render();
      };
    });
  }

  function lockBtn(path) {
    const locked = path in state.locks;
    return '<button class="lock' + (locked ? ' locked' : '') + '" data-path="' + path + '" title="' + (locked ? 'Unlock' : 'Lock') + ' — locked fields survive a reroll (key: L)">' + (locked ? '&#128274;' : '&#128275;') + '</button>';
  }
  function row(path, label, valueHtml) {
    return '<div class="row" data-path="' + path + '"><span class="row-label">' + label + '</span><span class="row-value">' + valueHtml + '</span>' + lockBtn(path) + '</div>';
  }
  function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;'); }
  function list(items) { return '<ul>' + items.map(i => '<li>' + esc(i) + '</li>').join('') + '</ul>'; }

  function render() {
    const c = state.char;
    // Centre: portrait, arms, name.
    $('#portrait-box').innerHTML = PORTRAIT.render(c.portrait, 'ui');
    const her = HERALDRY.render(c.heraldry, 'uih');
    $('#arms-box').innerHTML = her.svg + (c.heraldry.type === 'mark' ? '<div class="mark-note">' + esc(c.heraldry.place) + '</div>' : '');
    $('#char-name').textContent = c.name.full;
    $('#char-sub').textContent = c.socialClass.label + ' · ' + c.occupation.name + ' · ' + c.region.name;
    $('#blazon').textContent = her.blazon || '';
    $('#violation-note').textContent = (c.heraldry.violation ? 'Arms in violation of the rule of tincture — the herald noted it.' : '');

    const alive = c.family.siblings.filter(s => s.alive).length;
    const secs = [];
    if (c.fiveE) {
      const f = c.fiveE;
      const ab = f.abilities, md = f.mods;
      const stat = k => k.toUpperCase() + ' ' + ab[k] + ' (' + (md[k] >= 0 ? '+' : '') + md[k] + ')';
      secs.push(section('The adventurer (5e)', [
        row('fiveE', 'Adventurer',
          '<strong>' + esc(f.race.label) + ' ' + esc(f.class.label) + '</strong>, level ' + f.level + ' · ' + esc(f.alignment) + '<br>' +
          'Background: ' + esc(f.background) + ' <em>(from the life below)</em><br>' +
          ['str', 'dex', 'con', 'int', 'wis', 'cha'].map(stat).join(' · ') + '<br>' +
          'HP ' + f.hp + ' · AC ' + f.ac + ' (' + esc(f.class.acNote) + ') · proficiency +' + f.prof + ' · saves ' + esc(f.class.saves) + ' · speed ' + f.race.speed + ' ft<br>' +
          '<em>' + esc(f.race.note) + '</em>' +
          '<div class="srd-note">' + esc(f.attribution) + '</div>'),
      ]));
    }
    secs.push(section('Origin', [
      row('region', 'Region', esc(c.region.name) + ' — ' + esc(c.region.terrain) + '. Lives by ' + esc(c.region.economy) + '. In living memory: ' + esc(c.region.disaster) + '.'),
      row('culture', 'Culture', esc(c.culture)),
      row('socialClass', 'Class', esc(c.socialClass.label) + ' — ' + esc(c.socialClass.desc)),
    ]));
    secs.push(section('Birth & family', [
      row('birth', 'Birth', esc(c.birth.season) + ', ' + esc(c.birth.legitimacy) + ', born ' + c.birth.order + ordSuffix(c.birth.order) + '. ' + esc(c.birth.circumstance) + '.'),
      row('family', 'Family', esc(c.family.structure) + '. Siblings: ' + c.family.siblings.length + ' born, ' + alive + ' living. Father ' + esc(c.family.father.name) + (c.family.father.alive ? '' : ' (dead)') + ', mother ' + (c.family.mother.alive ? 'living' : 'dead') + '.' + (c.family.guardian ? ' Guardian: ' + esc(c.family.guardian) + '.' : '')),
      row('name', 'Name', esc(c.name.full) + ' <em>(' + esc(c.name.rule) + ': ' + esc(c.name.source) + ')</em>'),
      row('sex', 'Sex', esc(c.sex)),
      row('age', 'Age', c.age + ' (' + esc(c.ageBracket.label) + '), ' + esc(c.marital)),
    ]));
    secs.push(section('Station', [
      row('occupation', 'Occupation', esc(c.occupation.name)),
      row('education', 'Education', esc(c.education.label) + ' — ' + esc(c.education.desc)),
    ]));
    secs.push(section('Body', [
      row('body', 'Body', esc([c.body.build, c.body.height, c.body.hair, c.body.eyes].join('; ')) + '.<br>Teeth: ' + esc(c.body.teeth) + '. Hands: ' + esc(c.body.hands) + '. Voice: ' + esc(c.body.voice) + '. Smells ' + esc(c.body.smell) + '.' +
        list(c.body.features.concat(c.body.scars.map(s => 'Scar: ' + s.v), c.body.ailments.map(a => 'Ailment: ' + a)))),
    ]));
    secs.push(section('Mind', [
      row('mind', 'Mind', list([
        'Temperament: ' + c.mind.temperament, 'Virtue: ' + c.mind.virtue, 'Vice: ' + c.mind.vice,
        'Fear: ' + c.mind.fear, 'Ambition: ' + c.mind.ambition, 'Faith: ' + c.mind.faith, 'Habit: ' + c.mind.tic,
      ].concat(c.mind.superstitions.map(s => 'Superstition: ' + s)))),
    ]));
    if (c.touch) secs.push(section('The Touch', [
      row('touch', 'The Touch', esc(c.touch.manifestation) + '<br><em>Or, as the sensible say: ' + esc(c.touch.mundaneExplanation) + '</em>'),
    ]));
    secs.push(section('Skills', [row('skills', 'Skills', list(c.skills.map(s => s.name + ' (' + s.tier + ')' + (s.unlikely ? ' — unlikely for their station' : ''))))]));
    secs.push(section('Possessions', [row('possessions', 'Possessions', list(c.possessions.map(p => p.item + ' — ' + p.price)))]));
    secs.push(section('People', [row('relationships', 'People', list(c.relationships.map(r => r.name + ', ' + r.tie + ' — ' + r.tension)))]));
    secs.push(section('The secret', [row('secret', 'Secret', esc(c.secret) + '.')]));
    secs.push(section('The wound in the world', [row('problem', 'Problem', esc(c.problem) + '.')]));
    if (c.heraldry.type === 'arms') secs.push(section('Arms', [row('heraldry', 'Blazon', '<em>' + esc(her.blazon) + '</em>')]));
    else secs.push(section('House mark', [row('heraldry', 'Mark', esc(c.heraldry.place))]));
    if (c.flags.length) secs.push(section('Of note', [row('flags', 'Flags', list(c.flags))]));
    $('#sheet').innerHTML = secs.join('');

    // Tale cache.
    const cached = AI.getCached(c.seed);
    $('#tale-out').textContent = cached || '';
    $('#tale-box').style.display = cached ? '' : 'none';
    updateTaleButton();
    renderDebug();
    bindRows();
  }

  function renderItem() {
    const box = $('#item-box');
    const it = state.item;
    if (!it) { box.style.display = 'none'; box.innerHTML = ''; return; }
    box.style.display = '';
    box.innerHTML = '<h3>' + esc(it.name) + '</h3>' +
      '<div class="item-meta">' + esc(it.form) + ' · ' + esc(it.category) + ' · <strong>' + esc(it.rarity) + '</strong>' +
      (it.attunement ? ' (requires attunement)' : '') + ' · ' + esc(it.price) + '</div>' +
      '<ul>' + it.effects.map(e => '<li>' + esc(e.charAt(0).toUpperCase() + e.slice(1)) + '.</li>').join('') +
      '<li>Quirk: ' + esc(it.quirk) + '.</li>' +
      (it.curse ? '<li class="item-curse">' + esc(it.curse) + '.</li>' : '') +
      '<li><em>History: ' + esc(it.history) + '.</em></li></ul>' +
      '<div class="srd-note">seed ' + esc(it.seed) + ' · ' + esc(it.attribution) + '</div>';
  }

  function rollItem(seed) {
    state.itemSeed = seed || randomSeed();
    state.item = GEN.generateItem(state.itemSeed);
    writeHash();
    renderItem();
  }

  function ordSuffix(n) { return n === 1 ? 'st' : n === 2 ? 'nd' : n === 3 ? 'rd' : 'th'; }
  function section(title, rows) {
    return '<details open><summary>' + title + '</summary>' + rows.join('') + '</details>';
  }

  function renderDebug() {
    const box = $('#debug-box');
    if (!currentDebug()) { box.style.display = 'none'; return; }
    box.style.display = '';
    const c = state.char;
    let html = '<h3>Generation trace — ' + TRACE.rows.length + ' rolls, ' + c.clamps.length + ' clamps</h3>';
    html += '<div class="trace">' + TRACE.rows.map(r =>
      r.t === 'clamp'
        ? '<div class="clamp">CLAMP [' + esc(r.rule) + '] ' + esc(r.detail) + '</div>'
        : '<div>' + esc(r.label) + ' → ' + esc(JSON.stringify(r.detail)) + '</div>'
    ).join('') + '</div>';
    html += '<h3>Clamps</h3>' + (c.clamps.length ? list(c.clamps.map(x => '[' + x.rule + '] ' + x.detail)) : '<p>none</p>');
    box.innerHTML = html;
  }

  function bindRows() {
    document.querySelectorAll('.lock').forEach(btn => {
      btn.onclick = () => toggleLock(btn.dataset.path);
    });
    document.querySelectorAll('.row').forEach(r => {
      r.onmouseenter = () => { state.hoveredPath = r.dataset.path; };
      r.onmouseleave = () => { if (state.hoveredPath === r.dataset.path) state.hoveredPath = null; };
    });
  }

  function toggleLock(path) {
    if (path in state.locks) delete state.locks[path];
    else state.locks[path] = JSON.parse(JSON.stringify(GEN.getPath(state.char, path)));
    render();
  }

  function reroll() {
    if (state.group) generateGroup(state.group.kind, randomSeed());
    else generate(randomSeed());
  }
  function generateFromInput() {
    const s = $('#seed-input').value.trim() || randomSeed();
    if (state.group) generateGroup(state.group.kind, s);
    else generate(s);
  }

  function updateTaleButton() {
    const btn = $('#tale-btn');
    const hasKey = !!AI.getKey();
    btn.disabled = !hasKey;
    btn.title = hasKey ? 'Call the Anthropic API to write this character\'s backstory'
      : 'Disabled: no API key. Open Settings and paste an Anthropic API key — it is stored only in this browser\'s localStorage.';
  }

  /* ---- wiring ---- */
  document.addEventListener('DOMContentLoaded', () => {
    // Populate override dropdowns.
    $('#ov-region').innerHTML = '<option value="">any region</option>' + DATA.regions.map(r => '<option value="' + r.v.key + '">' + r.v.name + '</option>').join('');
    $('#ov-class').innerHTML = '<option value="">any class</option>' + DATA.classes.map(x => '<option value="' + x.v.key + '">' + x.v.label + '</option>').join('');
    $('#ov-sex').innerHTML = '<option value="">any sex</option><option value="male">male</option><option value="female">female</option>';

    $('#generate-btn').onclick = generateFromInput;
    $('#reroll-btn').onclick = reroll;
    $('#seed-input').addEventListener('keydown', e => { if (e.key === 'Enter') generateFromInput(); });
    ['#ov-region', '#ov-class', '#ov-sex'].forEach(sel => { $(sel).onchange = () => { if (!state.group) generate(state.seed); }; });

    $('#rules-mode').onchange = () => {
      state.mode = $('#rules-mode').value;
      if (state.group) generateGroup(state.group.kind, state.seed);
      else generate(state.seed);
    };
    $('#item-btn').onclick = () => rollItem();
    $('#item-clear-btn').onclick = () => { state.item = null; state.itemSeed = null; writeHash(); renderItem(); };

    $('#solo-btn').onclick = () => generate(state.seed || randomSeed());
    $('#household-btn').onclick = () => generateGroup('household', state.seed || randomSeed());
    $('#warband-btn').onclick = () => generateGroup('warband', state.seed || randomSeed());
    $('#settlement-btn').onclick = () => generateGroup('settlement', state.seed || randomSeed());

    $('#copy-link-btn').onclick = copyLink;
    $('#export-json-btn').onclick = () => {
      if (state.group) EXPORT.download(state.seed + '-' + state.group.kind + '.json',
        JSON.stringify({ format: 'medieval-company', version: state.group.version, seed: state.seed, kind: state.group.kind, group: state.group }, null, 2),
        'application/json');
      else EXPORT.download(state.seed + '.json', EXPORT.toJSON(state.char, state.locks), 'application/json');
    };
    $('#export-md-btn').onclick = () => {
      const itemMd = state.item ? '\n\n---\n\n' + EXPORT.itemMarkdown(state.item) : '';
      if (state.group) EXPORT.download(state.seed + '-' + state.group.kind + '.md', EXPORT.companyMarkdown(state.group) + itemMd, 'text/markdown');
      else EXPORT.download(state.seed + '.md', EXPORT.toMarkdown(state.char) + itemMd, 'text/markdown');
    };
    $('#export-png-btn').onclick = () => EXPORT.toPNG(state.char);
    $('#print-btn').onclick = () => window.print();
    $('#print-summary-btn').onclick = () => {
      if (!state.group) return;
      document.body.classList.add('summary-mode');
      window.print();
    };
    window.addEventListener('afterprint', () => document.body.classList.remove('summary-mode'));
    $('#import-input').onchange = (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const rd = new FileReader();
      rd.onload = () => {
        try {
          const data = JSON.parse(rd.result);
          if (data.format === 'medieval-company') {
            state.seed = data.seed;
            state.group = data.group;
            state.sel = 0;
            state.char = data.group.members[0].char;
          } else if (data.format === 'medieval-character') {
            state.seed = data.seed;
            state.locks = data.locks || {};
            state.char = data.character;
            state.group = null;
          } else throw new Error('not a character or company file');
          $('#seed-input').value = state.seed;
          writeHash();
          renderStrip();
          render();
        } catch (err) { alert('Import failed: ' + err.message); }
      };
      rd.readAsText(f);
      e.target.value = '';
    };

    // Settings.
    $('#settings-btn').onclick = () => { $('#settings-panel').classList.toggle('open'); $('#api-key-input').value = AI.getKey(); };
    $('#api-key-save').onclick = () => { AI.setKey($('#api-key-input').value.trim()); $('#settings-panel').classList.remove('open'); updateTaleButton(); };
    $('#api-key-clear').onclick = () => { AI.setKey(''); $('#api-key-input').value = ''; updateTaleButton(); };

    // Tale.
    $('#tale-btn').onclick = () => {
      const c = state.char;
      const cached = AI.getCached(c.seed);
      if (cached && !confirm('A tale is already written for this seed. Write it again?')) return;
      $('#tale-box').style.display = '';
      $('#tale-out').textContent = '…';
      $('#tale-err').textContent = '';
      AI.writeTale(c,
        partial => { $('#tale-out').textContent = partial; },
        () => { },
        err => { $('#tale-err').textContent = err; });
    };

    // Keyboard: Space reroll, L lock hovered, C copy link.
    document.addEventListener('keydown', e => {
      if (/INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)) return;
      if (e.code === 'Space') { e.preventDefault(); reroll(); }
      else if (e.key === 'l' || e.key === 'L') { if (state.hoveredPath) toggleLock(state.hoveredPath); }
      else if (e.key === 'c' || e.key === 'C') copyLink();
    });

    state.mode = modeFromHash();
    $('#rules-mode').value = state.mode;
    const hashItem = itemFromHash();
    const hashSeed = seedFromHash() || randomSeed();
    const hashGroup = groupFromHash();
    if (hashGroup) generateGroup(hashGroup, hashSeed);
    else generate(hashSeed);
    if (hashItem) rollItem(hashItem);
  });

  function copyLink() {
    const url = location.href; // writeHash keeps seed (and group mode) current in the hash
    const done = () => {
      const b = $('#copy-link-btn'); const t = b.textContent;
      b.textContent = 'Copied!'; setTimeout(() => { b.textContent = t; }, 1200);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(url).then(done, () => fallbackCopy(url, done));
    else fallbackCopy(url, done);
  }
  function fallbackCopy(text, done) {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); done(); } catch (e) { alert('Copy this link:\n' + text); }
    ta.remove();
  }
